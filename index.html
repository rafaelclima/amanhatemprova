<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amanhã Tem Prova</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --secondary: #f472b6;
      --accent: #22d3ee;
      --dark: #1e293b;
      --light: #f8fafc;
    }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      background-attachment: fixed;
      color: var(--light);
      overflow-x: hidden;
    }

    .bg-pattern {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .bg-pattern::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 20% 80%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(244, 114, 182, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(34, 211, 238, 0.1) 0%, transparent 50%);
      animation: pulse 8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .floating-shapes {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .shape {
      position: absolute;
      border-radius: 50%;
      animation: float 20s ease-in-out infinite;
    }

    .shape:nth-child(1) {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.2) 0%, transparent 70%);
      top: -100px;
      left: -50px;
      animation-delay: 0s;
    }

    .shape:nth-child(2) {
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(244, 114, 182, 0.2) 0%, transparent 70%);
      bottom: 10%;
      right: -50px;
      animation-delay: -5s;
    }

    .shape:nth-child(3) {
      width: 150px;
      height: 150px;
      background: radial-gradient(circle, rgba(34, 211, 238, 0.2) 0%, transparent 70%);
      top: 50%;
      left: 10%;
      animation-delay: -10s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(30px, -30px) rotate(5deg); }
      50% { transform: translate(0, -50px) rotate(0deg); }
      75% { transform: translate(-30px, -30px) rotate(-5deg); }
    }

    .container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .logo {
      margin-bottom: 3rem;
      text-align: center;
      animation: slideDown 0.8s ease-out;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-icon {
      font-size: 4rem;
      margin-bottom: 0.5rem;
      display: inline-block;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .logo h1 {
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(135deg, #6366f1 0%, #f472b6 50%, #22d3ee 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 4px 30px rgba(99, 102, 241, 0.5);
      letter-spacing: -1px;
    }

    .logo p {
      font-size: 1.1rem;
      color: #94a3b8;
      margin-top: 0.5rem;
    }

    .students-grid {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 800px;
      animation: fadeInUp 1s ease-out 0.3s both;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .student-card {
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: 24px;
      padding: 2.5rem 3rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      overflow: hidden;
      min-width: 220px;
    }

    .student-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .student-card:hover::before {
      opacity: 1;
    }

    .student-card:hover {
      transform: translateY(-10px) scale(1.02);
      border-color: rgba(99, 102, 241, 0.6);
      box-shadow: 
        0 20px 40px rgba(0, 0, 0, 0.3),
        0 0 60px rgba(99, 102, 241, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .student-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      margin: 0 auto 1rem;
      position: relative;
    }

    .student-card:first-child .student-avatar {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      box-shadow: 0 8px 30px rgba(99, 102, 241, 0.5);
    }

    .student-card:last-child .student-avatar {
      background: linear-gradient(135deg, #f472b6 0%, #f97316 100%);
      box-shadow: 0 8px 30px rgba(244, 114, 182, 0.5);
    }

    .student-name {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--light);
      margin-bottom: 0.5rem;
    }

    .student-subtitle {
      font-size: 0.9rem;
      color: #94a3b8;
      margin-bottom: 1rem;
    }

    .student-arrow {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--accent);
      font-weight: 600;
      font-size: 0.95rem;
      transition: all 0.3s;
    }

    .student-card:hover .student-arrow {
      gap: 0.8rem;
      color: var(--secondary);
    }

    .student-arrow svg {
      transition: transform 0.3s;
    }

    .student-card:hover .student-arrow svg {
      transform: translateX(5px);
    }

    .footer {
      margin-top: 4rem;
      text-align: center;
      color: #64748b;
      font-size: 0.85rem;
      animation: fadeInUp 1s ease-out 0.6s both;
    }

    .footer span {
      color: var(--secondary);
    }

    @media (max-width: 600px) {
      .logo h1 {
        font-size: 2.2rem;
      }

      .students-grid {
        flex-direction: column;
        align-items: center;
      }

      .student-card {
        width: 100%;
        max-width: 300px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="floating-shapes">
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
  </div>

  <div class="container">
    <div class="logo">
      <div class="logo-icon">📚</div>
      <h1>Amanhã Tem Prova</h1>
      <p>Quem vai estudar agora?</p>
    </div>

    <div class="students-grid">
      <a href="Lara/" class="student-card">
        <div class="student-avatar">👧</div>
        <div class="student-name">Lara</div>
        <div class="student-subtitle">15 anos • Ensino Médio</div>
        <div class="student-arrow">
          Ver materiais
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </div>
      </a>

      <a href="Liz/" class="student-card">
        <div class="student-avatar">👩</div>
        <div class="student-name">Liz</div>
        <div class="student-subtitle">9 anos • Ensino Fundamental</div>
        <div class="student-arrow">
          Ver materiais
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </div>
      </a>
    </div>
    </div>

    <div class="footer">
      Criado pelo Papi com <span>❤</span>
    </div>
  </div>
</body>
</html>
