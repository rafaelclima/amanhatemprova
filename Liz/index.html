<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liz - Materiais de Estudo</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --secondary: #f472b6;
      --accent: #22d3ee;
      --dark: #1e293b;
      --light: #f8fafc;
    }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      background-attachment: fixed;
      color: var(--light);
      overflow-x: hidden;
    }

    .bg-pattern {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .bg-pattern::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 20% 80%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(244, 114, 182, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(34, 211, 238, 0.1) 0%, transparent 50%);
      animation: pulse 8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .floating-shapes {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .shape {
      position: absolute;
      border-radius: 50%;
      animation: float 20s ease-in-out infinite;
    }

    .shape:nth-child(1) {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.2) 0%, transparent 70%);
      top: -100px;
      left: -50px;
      animation-delay: 0s;
    }

    .shape:nth-child(2) {
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(244, 114, 182, 0.2) 0%, transparent 70%);
      bottom: 10%;
      right: -50px;
      animation-delay: -5s;
    }

    .shape:nth-child(3) {
      width: 150px;
      height: 150px;
      background: radial-gradient(circle, rgba(34, 211, 238, 0.2) 0%, transparent 70%);
      top: 50%;
      left: 10%;
      animation-delay: -10s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(30px, -30px) rotate(5deg); }
      50% { transform: translate(0, -50px) rotate(0deg); }
      75% { transform: translate(-30px, -30px) rotate(-5deg); }
    }

    .container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .header {
      text-align: center;
      margin-bottom: 3rem;
      animation: slideDown 0.8s ease-out;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: #94a3b8;
      text-decoration: none;
      font-size: 0.95rem;
      margin-bottom: 2rem;
      transition: all 0.3s;
      animation: slideDown 0.8s ease-out;
    }

    .back-btn:hover {
      color: var(--accent);
      gap: 0.8rem;
    }

    .back-btn svg {
      transition: transform 0.3s;
    }

    .back-btn:hover svg {
      transform: translateX(-5px);
    }

    .student-info {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .student-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      background: linear-gradient(135deg, #f472b6 0%, #f97316 100%);
      box-shadow: 0 8px 30px rgba(244, 114, 182, 0.5);
    }

    .student-name {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f472b6 0%, #f97316 50%, #22d3ee 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 1.1rem;
      color: #94a3b8;
    }

    .section-title {
      font-size: 1.3rem;
      color: #94a3b8;
      margin-bottom: 1.5rem;
      font-weight: 600;
    }

    .subjects-grid {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 600px;
      animation: fadeInUp 1s ease-out 0.3s both;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .subject-card {
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(244, 114, 182, 0.3);
      border-radius: 20px;
      padding: 1.5rem 2rem;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      min-width: 250px;
    }

    .subject-card:hover {
      transform: translateY(-8px) scale(1.02);
      border-color: rgba(244, 114, 182, 0.6);
      box-shadow: 
        0 20px 40px rgba(0, 0, 0, 0.3),
        0 0 40px rgba(244, 114, 182, 0.2);
    }

    .subject-icon {
      font-size: 2rem;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f472b6 0%, #f97316 100%);
      border-radius: 12px;
    }

    .subject-info h3 {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--light);
      margin-bottom: 0.25rem;
    }

    .subject-info p {
      font-size: 0.85rem;
      color: #94a3b8;
    }

    .subject-arrow {
      color: var(--accent);
      margin-left: auto;
      transition: all 0.3s;
    }

    .subject-card:hover .subject-arrow {
      color: var(--secondary);
      transform: translateX(5px);
    }

    .empty-state {
      text-align: center;
      color: #64748b;
      padding: 3rem;
    }

    @media (max-width: 600px) {
      .subjects-grid {
        flex-direction: column;
        align-items: center;
      }

      .subject-card {
        width: 100%;
        max-width: 300px;
      }

      .student-name {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="floating-shapes">
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
  </div>

  <div class="container">
    <a href="../index.html" class="back-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Voltar
    </a>

    <div class="header">
      <div class="student-info">
        <div class="student-avatar">👩</div>
        <div class="student-name">Liz</div>
      </div>
      <p class="subtitle">9 anos • Ensino Fundamental</p>
    </div>

    <p class="section-title">Escolha uma matéria para estudar</p>

    <div class="subjects-grid">
      <a href="historia/pre_historia/" class="subject-card">
        <div class="subject-icon">🏛️</div>
        <div class="subject-info">
          <h3>História</h3>
          <p>Pré-história</p>
        </div>
        <div class="subject-arrow">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </div>
      </a>

      <a href="geografia/mapas_regioes/" class="subject-card">
        <div class="subject-icon">🗺️</div>
        <div class="subject-info">
          <h3>Geografia</h3>
          <p>Mapas e Regiões</p>
        </div>
        <div class="subject-arrow">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </div>
      </a>
    </div>
  </div>
</body>
</html>
